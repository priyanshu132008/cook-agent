<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 220 220" width="64" height="64">
  <defs>
    <radialGradient id="pan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f1815"/>
      <stop offset="100%" stop-color="#0a0808"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="55%" stop-color="#ff7a2a"/>
      <stop offset="100%" stop-color="#ffcc33"/>
    </linearGradient>
  </defs>

  <!-- Pan body -->
  <ellipse cx="95" cy="133" rx="80" ry="23" fill="url(#pan)"/>
  <!-- Pan rim -->
  <ellipse cx="95" cy="128" rx="82" ry="27" fill="none" stroke="#ff7a2a" stroke-width="3.4"/>
  <ellipse cx="95" cy="138" rx="72" ry="13" fill="none" stroke="#ff7a2a" stroke-width="2.2"/>
  <!-- Handle -->
  <rect x="168" y="110" width="34" height="11" rx="5.5" fill="#141010" stroke="#ff7a2a" stroke-width="2.2"/>
  <rect x="195" y="112.5" width="11" height="6" rx="3" fill="#1e1816" stroke="#ff7a2a" stroke-width="1.4"/>

  <!-- Single flame -->
  <g transform="translate(88,106)">
    <path d="M-9,-52 C1,-40 11,-23 5,-9 C2,-2 -4,0 0,0 C4,0 8,-2 4,-9 C-2,-23 3,-40 -9,-52Z" fill="url(#flame)"/>
    <path d="M0,-38 C6,-27 9,-15 3,-7 C1,-2 -3,0 0,0 C3,0 6,-2 3,-7 C-1,-15 0,-27 0,-38Z" fill="#ffcc33" opacity="0.85"/>
  </g>
</svg>